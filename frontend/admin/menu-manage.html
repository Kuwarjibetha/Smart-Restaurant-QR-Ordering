<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Manage Menu · Spice Trail Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="../css/style.css" />
</head>
<body class="pb-16" style="background:var(--cream)">

<header class="sticky top-0 z-30 shadow-sm" style="background: var(--cream); border-bottom: 1px solid var(--clay-line);">
  <div class="max-w-5xl mx-auto px-5 py-3.5 flex items-center justify-between gap-4">

    
    <div class="flex items-center gap-3 min-w-0">
      <a href="../index.html" class="flex items-center gap-2 no-underline flex-shrink-0" style="color:var(--charcoal)">
        <span class="text-xl">🌿</span>
        <span class="display text-base font-bold hidden sm:inline">Spice Trail</span>
      </a>
      <span class="text-stone-300 hidden sm:inline">|</span>
      <div class="min-w-0">
        <p class="eyebrow leading-none truncate">Menu Management</p>
        <h1 class="display text-lg font-bold leading-tight truncate">Dishes &amp; Stock Control</h1>
      </div>
    </div>

    
    <nav class="hidden md:flex items-center gap-3 text-xs font-semibold flex-shrink-0">
      <a href="tables.html" class="no-underline text-stone-700 hover:text-stone-900 transition-colors">Table QRs</a>
      <a href="analytics.html" class="no-underline text-stone-700 hover:text-stone-900 transition-colors">Analytics</a>
      <a href="dashboard.html" class="btn-secondary px-3 py-1.5 text-xs no-underline font-semibold">Dashboard →</a>
    </nav>

    
    <button id="admin-hamburger-mm" class="md:hidden flex items-center justify-center w-9 h-9 rounded-xl border flex-shrink-0" style="border-color:var(--clay-line); background:var(--white); cursor:pointer;" aria-label="Open menu">
      <svg width="18" height="14" viewBox="0 0 18 14" fill="none">
        <rect y="0" width="18" height="2" rx="1" fill="#2B2420"/>
        <rect y="6" width="18" height="2" rx="1" fill="#2B2420"/>
        <rect y="12" width="18" height="2" rx="1" fill="#2B2420"/>
      </svg>
    </button>
  </div>

  
  <div id="admin-mobile-nav-mm" style="display:none; background:var(--cream); border-top:1px solid var(--clay-line);">
    <div class="max-w-5xl mx-auto px-5 py-4 flex flex-col gap-2 text-xs font-semibold">
      <a href="tables.html" class="px-4 py-2.5 rounded-xl no-underline text-stone-800 hover:bg-amber-50 transition-colors">🪑 Table QRs</a>
      <a href="analytics.html" class="px-4 py-2.5 rounded-xl no-underline text-stone-800 hover:bg-amber-50 transition-colors">📈 Analytics</a>
      <a href="dashboard.html" class="px-4 py-2.5 rounded-xl no-underline font-semibold hover:bg-amber-50 transition-colors" style="color:var(--saffron-deep)">Dashboard →</a>
    </div>
  </div>
</header>

<script>
  const _hamMM = document.getElementById('admin-hamburger-mm');
  const _mobMM = document.getElementById('admin-mobile-nav-mm');
  _hamMM.addEventListener('click', () => { _mobMM.style.display = _mobMM.style.display === 'none' ? 'block' : 'none'; });
</script>

<main class="max-w-5xl mx-auto px-5 py-6 space-y-6">

  
  <section class="card p-6 shadow-sm">
    <h2 class="eyebrow mb-3">➕ Add New Dish</h2>
    
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-6 gap-3 mb-3">
      <input id="new-name" placeholder="Dish Name (e.g. Paneer Tikka)" class="col-span-2 px-3 py-2 rounded-lg text-xs" style="border:1.5px solid var(--clay-line); background:var(--white); outline:none;" />
      <input id="new-category" placeholder="Category (e.g. Starters)" class="px-3 py-2 rounded-lg text-xs" style="border:1.5px solid var(--clay-line); background:var(--white); outline:none;" />
      <input id="new-price" type="number" placeholder="Price ₹ (e.g. 240)" class="px-3 py-2 rounded-lg text-xs" style="border:1.5px solid var(--clay-line); background:var(--white); outline:none;" />
      <input id="new-prep" type="number" placeholder="Prep (min)" class="px-3 py-2 rounded-lg text-xs" style="border:1.5px solid var(--clay-line); background:var(--white); outline:none;" />
      <select id="new-veg" class="px-3 py-2 rounded-lg text-xs font-semibold" style="border:1.5px solid var(--clay-line); background:var(--white); outline:none;">
        <option value="true">🌱 Veg</option>
        <option value="false">🍗 Non-Veg</option>
      </select>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-3">
      <div>
        <label class="text-[11px] font-semibold block mb-1" style="color: var(--charcoal-soft)">Allergens (comma-separated)</label>
        <input id="new-allergens" placeholder="e.g. nuts, dairy, gluten" class="w-full px-3 py-2 rounded-lg text-xs" style="border:1.5px solid var(--clay-line); background:var(--white); outline:none;" />
      </div>
      <div>
        <label class="text-[11px] font-semibold block mb-1" style="color: var(--charcoal-soft)">Dietary tags (comma-separated)</label>
        <input id="new-dietary-tags" placeholder="e.g. vegan, jain, gluten-free" class="w-full px-3 py-2 rounded-lg text-xs" style="border:1.5px solid var(--clay-line); background:var(--white); outline:none;" />
      </div>
    </div>

    <button id="add-item-btn" class="btn-primary px-5 py-2.5 text-xs font-semibold">Save Dish to Menu →</button>
    <p id="add-error" class="text-xs mt-2 hidden" style="color: var(--chili)"></p>
  </section>

  
  <section class="space-y-3">
    <div class="flex items-center justify-between">
      <h2 class="eyebrow">Current Active Menu Items</h2>
      <span id="item-count-badge" class="text-xs font-bold px-2.5 py-0.5 rounded-full" style="background:var(--cream-deep); border:1px solid var(--clay-line)">0 dishes</span>
    </div>
    <div id="menu-list" class="space-y-3"></div>
  </section>
</main>

<script src="../js/api.js"></script>
<script>
  if (!localStorage.getItem("adminToken")) window.location.href = "login.html";

  function categoryIcon(category) {
    const map = { "Starters": "🥟", "Main Course": "🍛", "Desserts": "🍮", "Drinks": "🥤" };
    return map[category] || "🍽️";
  }

  async function loadMenu() {
    const list = document.getElementById("menu-list");
    list.innerHTML = `<p class="text-xs text-stone-500">Loading dishes…</p>`;
    try {
      const { items } = await api.getMenu();
      list.innerHTML = "";
      document.getElementById("item-count-badge").textContent = `${items.length} dishes`;
      items.forEach((item) => list.appendChild(renderRow(item)));
    } catch (err) {
      list.innerHTML = `<p class="text-xs" style="color: var(--chili)">Couldn't load menu items.</p>`;
    }
  }

  function renderRow(item) {
    const row = document.createElement("div");
    row.className = "card p-4 shadow-sm flex flex-col md:flex-row md:items-center justify-between gap-4";
    row.innerHTML = `
      <div class="flex-1">
        <div class="flex items-center gap-2 mb-1">
          <span class="text-xl">${categoryIcon(item.category)}</span>
          <span class="veg-dot ${item.isVeg ? "" : "nonveg-dot"}"></span>
          <h3 class="font-bold text-sm" style="color: var(--charcoal)">${item.name}</h3>
          <span class="text-xs text-stone-500">· ${item.category}</span>
        </div>
        <p class="text-xs font-semibold mb-2" style="color: var(--saffron-deep)">
          ₹${item.price} · ⏱ ~${item.avgPrepTimeMinutes || 15}m · ${item.isVeg ? "Veg" : "Non-Veg"}
        </p>

        <div class="flex flex-wrap items-center gap-2">
          <input class="allergens-input px-2 py-1 rounded text-xs" style="border:1.5px solid var(--clay-line); width:170px; outline:none;" placeholder="Allergens (nuts, dairy)" value="${(item.allergens || []).join(", ")}" />
          <input class="dietary-input px-2 py-1 rounded text-xs" style="border:1.5px solid var(--clay-line); width:170px; outline:none;" placeholder="Dietary (vegan, jain)" value="${(item.dietaryTags || []).join(", ")}" />
          <button class="btn-secondary px-2.5 py-1 text-xs save-tags-btn">Save tags</button>
          <span class="save-tags-msg text-xs hidden font-semibold" style="color: var(--cardamom);">Saved ✓</span>
        </div>
      </div>

      <div class="flex items-center gap-3 shrink-0 pt-2 md:pt-0" style="border-top:1px solid var(--clay-line)">
        <label class="text-xs font-semibold flex items-center gap-1.5 cursor-pointer">
          <input type="checkbox" class="accent-emerald-700 cursor-pointer" ${item.available ? "checked" : ""} />
          <span>${item.available ? "In Stock" : "<span style='color:var(--chili)'>Out of stock</span>"}</span>
        </label>
        <button class="btn-secondary px-3 py-1.5 text-xs text-rose-700 hover:bg-rose-50 delete-btn">Remove</button>
      </div>
    `;

    row.querySelector(".save-tags-btn").onclick = async () => {
      const allergens = row.querySelector(".allergens-input").value.split(",").map((s) => s.trim()).filter(Boolean);
      const dietaryTags = row.querySelector(".dietary-input").value.split(",").map((s) => s.trim()).filter(Boolean);
      try {
        await api.updateMenuItem(item._id, { allergens, dietaryTags });
        const msg = row.querySelector(".save-tags-msg");
        msg.classList.remove("hidden");
        setTimeout(() => msg.classList.add("hidden"), 1500);
      } catch (err) {
        alert(err.message);
      }
    };

    row.querySelector("input[type=checkbox]").onchange = async (e) => {
      try {
        await api.updateMenuItem(item._id, { available: e.target.checked });
        loadMenu();
      } catch (err) {
        alert(err.message);
        e.target.checked = !e.target.checked;
      }
    };

    row.querySelector(".delete-btn").onclick = async () => {
      if (!confirm(`Remove "${item.name}" from the menu?`)) return;
      try {
        await api.deleteMenuItem(item._id);
        row.remove();
      } catch (err) {
        alert(err.message);
      }
    };
    return row;
  }

  document.getElementById("add-item-btn").onclick = async () => {
    const name = document.getElementById("new-name").value.trim();
    const category = document.getElementById("new-category").value.trim();
    const price = Number(document.getElementById("new-price").value);
    const avgPrepTimeMinutes = Number(document.getElementById("new-prep").value) || 12;
    const isVeg = document.getElementById("new-veg").value === "true";
    const allergens = document.getElementById("new-allergens").value.split(",").map((s) => s.trim()).filter(Boolean);
    const dietaryTags = document.getElementById("new-dietary-tags").value.split(",").map((s) => s.trim()).filter(Boolean);
    const errorEl = document.getElementById("add-error");
    errorEl.classList.add("hidden");

    if (!name || !category || !price) {
      errorEl.textContent = "Name, category, and price are required.";
      errorEl.classList.remove("hidden");
      return;
    }

    try {
      await api.createMenuItem({ name, category, price, avgPrepTimeMinutes, isVeg, allergens, dietaryTags });
      document.getElementById("new-name").value = "";
      document.getElementById("new-category").value = "";
      document.getElementById("new-price").value = "";
      document.getElementById("new-prep").value = "";
      document.getElementById("new-allergens").value = "";
      document.getElementById("new-dietary-tags").value = "";
      loadMenu();
    } catch (err) {
      errorEl.textContent = err.message;
      errorEl.classList.remove("hidden");
    }
  };

  loadMenu();
</script>
</body>
</html>
