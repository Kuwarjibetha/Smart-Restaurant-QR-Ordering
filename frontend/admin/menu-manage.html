<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Manage Menu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="../css/style.css" />
</head>
<body>

<header class="sticky top-0 z-30" style="background: var(--cream); border-bottom: 1px solid var(--clay-line);">
  <div class="max-w-4xl mx-auto px-5 py-4 flex items-center justify-between">
    <div>
      <p class="eyebrow">Admin</p>
      <h1 class="display text-2xl">Manage Menu</h1>
    </div>
    <a href="dashboard.html" style="color: var(--saffron-deep); text-decoration:none; font-weight:600; font-size:0.9rem;">← Dashboard</a>
  </div>
</header>

<main class="max-w-4xl mx-auto px-5 py-8">

  <section class="card p-5 mb-8">
    <p class="eyebrow mb-3">Add a new dish</p>
    <div class="grid grid-cols-2 md:grid-cols-6 gap-3">
      <input id="new-name" placeholder="Name" class="col-span-2 px-3 py-2 rounded-lg text-sm" style="border:1.5px solid var(--clay-line); outline:none;" />
      <input id="new-category" placeholder="Category" class="px-3 py-2 rounded-lg text-sm" style="border:1.5px solid var(--clay-line); outline:none;" />
      <input id="new-price" type="number" placeholder="Price ₹" class="px-3 py-2 rounded-lg text-sm" style="border:1.5px solid var(--clay-line); outline:none;" />
      <input id="new-prep" type="number" placeholder="Prep (min)" class="px-3 py-2 rounded-lg text-sm" style="border:1.5px solid var(--clay-line); outline:none;" />
      <select id="new-veg" class="px-3 py-2 rounded-lg text-sm" style="border:1.5px solid var(--clay-line); outline:none;">
        <option value="true">Veg</option>
        <option value="false">Non-Veg</option>
      </select>
    </div>
    <button id="add-item-btn" class="btn-primary px-5 py-2 text-sm mt-3">Add dish</button>
    <p id="add-error" class="text-sm mt-2 hidden" style="color: var(--chili)"></p>
  </section>

  <section>
    <p class="eyebrow mb-3">Current menu</p>
    <div id="menu-list" class="space-y-3"></div>
  </section>
</main>

<script src="../js/api.js"></script>
<script>
  if (!localStorage.getItem("adminToken")) window.location.href = "login.html";

  async function loadMenu() {
    const list = document.getElementById("menu-list");
    list.innerHTML = `<p style="color: var(--charcoal-soft)">Loading…</p>`;
    try {
      const { items } = await api.getMenu();
      list.innerHTML = "";
      items.forEach((item) => list.appendChild(renderRow(item)));
    } catch (err) {
      list.innerHTML = `<p style="color: var(--chili)">Couldn't load menu.</p>`;
    }
  }

  function renderRow(item) {
    const row = document.createElement("div");
    row.className = "card p-4 flex items-center justify-between gap-3";
    row.innerHTML = `
      <div>
        <p class="font-semibold">${item.name} <span class="text-sm font-normal" style="color: var(--charcoal-soft)">· ${item.category}</span></p>
        <p class="text-sm" style="color: var(--charcoal-soft)">₹${item.price} · ~${item.avgPrepTimeMinutes} min · ${item.isVeg ? "Veg" : "Non-Veg"}</p>
      </div>
      <div class="flex items-center gap-2">
        <label class="text-xs font-semibold flex items-center gap-1">
          <input type="checkbox" ${item.available ? "checked" : ""} /> In stock
        </label>
        <button class="btn-secondary px-3 py-1.5 text-xs delete-btn">Remove</button>
      </div>
    `;
    row.querySelector("input[type=checkbox]").onchange = async (e) => {
      try {
        await api.updateMenuItem(item._id, { available: e.target.checked });
      } catch (err) {
        alert(err.message);
        e.target.checked = !e.target.checked;
      }
    };
    row.querySelector(".delete-btn").onclick = async () => {
      if (!confirm(`Remove "${item.name}" from the menu?`)) return;
      try {
        await api.deleteMenuItem(item._id);
        row.remove();
      } catch (err) {
        alert(err.message);
      }
    };
    return row;
  }

  document.getElementById("add-item-btn").onclick = async () => {
    const name = document.getElementById("new-name").value.trim();
    const category = document.getElementById("new-category").value.trim();
    const price = Number(document.getElementById("new-price").value);
    const avgPrepTimeMinutes = Number(document.getElementById("new-prep").value) || 12;
    const isVeg = document.getElementById("new-veg").value === "true";
    const errorEl = document.getElementById("add-error");
    errorEl.classList.add("hidden");

    if (!name || !category || !price) {
      errorEl.textContent = "Name, category, and price are required.";
      errorEl.classList.remove("hidden");
      return;
    }

    try {
      await api.createMenuItem({ name, category, price, avgPrepTimeMinutes, isVeg });
      document.getElementById("new-name").value = "";
      document.getElementById("new-category").value = "";
      document.getElementById("new-price").value = "";
      document.getElementById("new-prep").value = "";
      loadMenu();
    } catch (err) {
      errorEl.textContent = err.message;
      errorEl.classList.remove("hidden");
    }
  };

  loadMenu();
</script>
</body>
</html>
