<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Login · Spice Trail</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="../css/style.css" />
</head>
<body class="min-h-screen flex flex-col items-center justify-center px-5 relative" style="background:var(--cream)">


<div class="absolute top-5 left-5 z-20">
  <a href="../index.html" class="btn-secondary px-4 py-2 text-xs no-underline flex items-center gap-1.5 font-semibold">
    <span>←</span> <span>Back to Home</span>
  </a>
</div>

<div class="card p-8 w-full max-w-sm shadow-md">
  <p class="eyebrow mb-1">Spice Trail Staff</p>
  <h1 class="display text-2xl mb-6">Staff Sign In</h1>

  <label class="text-xs font-semibold block mb-1">Email address</label>
  <input id="email" type="email" class="w-full px-3 py-2 rounded-lg text-xs mb-4" style="border:1.5px solid var(--clay-line); background:var(--white); outline:none;" placeholder="owner@restaurant.com" />

  <label class="text-xs font-semibold block mb-1">Password</label>
  <input id="password" type="password" class="w-full px-3 py-2 rounded-lg text-xs mb-2" style="border:1.5px solid var(--clay-line); background:var(--white); outline:none;" placeholder="••••••••" />

  <p id="error-msg" class="text-xs mb-3 hidden" style="color: var(--chili)"></p>

  <button id="login-btn" class="btn-primary w-full py-3 mt-2 text-xs font-semibold">Sign In →</button>

  <div class="border-t pt-4 mt-5 text-center" style="border-color:var(--clay-line)">
    <p class="text-xs text-stone-500 mb-2">Setting up this restaurant for the first time?</p>
    <a href="signup.html" class="btn-secondary px-4 py-2 text-xs no-underline inline-block font-semibold">Create Owner Account</a>
  </div>
</div>

<script src="../js/api.js"></script>
<script>
  document.getElementById("login-btn").onclick = async () => {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const errorEl = document.getElementById("error-msg");
    const btn = document.getElementById("login-btn");

    errorEl.classList.add("hidden");
    if (!email || !password) {
      errorEl.textContent = "Please enter both email and password.";
      errorEl.classList.remove("hidden");
      return;
    }

    btn.disabled = true;
    btn.textContent = "Signing in…";

    try {
      const { admin, token } = await api.login(email, password);
      localStorage.setItem("adminToken", token);
      localStorage.setItem("adminRole", admin.role);
      localStorage.setItem("adminName", admin.name);
      window.location.href = "dashboard.html";
    } catch (err) {
      errorEl.textContent = err.message || "Login failed. Check your credentials.";
      errorEl.classList.remove("hidden");
      btn.disabled = false;
      btn.textContent = "Sign In →";
    }
  };

  document.getElementById("password").addEventListener("keydown", (e) => {
    if (e.key === "Enter") document.getElementById("login-btn").click();
  });
</script>
</body>
</html>
