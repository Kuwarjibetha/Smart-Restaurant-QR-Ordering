<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sales Analytics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Work+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/style.css" />
</head>

<body>

<header class="sticky top-0 z-30 shadow-sm" style="background: var(--cream); border-bottom: 1px solid var(--clay-line);">
  <div class="max-w-4xl mx-auto px-5 py-3.5 flex items-center justify-between gap-4">

    
    <div class="flex items-center gap-3 min-w-0">
      <a href="../index.html" class="flex items-center gap-2 no-underline flex-shrink-0" style="color:var(--charcoal)">
        <span class="text-xl">🌿</span>
        <span class="display text-base font-bold hidden sm:inline">Spice Trail</span>
      </a>
      <span class="text-stone-300 hidden sm:inline">|</span>
      <div class="min-w-0">
        <p class="eyebrow leading-none truncate">Owner</p>
        <h1 class="display text-lg font-bold leading-tight truncate">Sales Analytics</h1>
      </div>
    </div>

    
    <nav class="hidden md:flex items-center gap-3 text-xs font-semibold flex-shrink-0">
      <a href="menu-manage.html" class="no-underline text-stone-700 hover:text-stone-900 transition-colors">Menu Items</a>
      <a href="tables.html" class="no-underline text-stone-700 hover:text-stone-900 transition-colors">Table QRs</a>
      <a href="dashboard.html" class="btn-secondary px-3 py-1.5 text-xs no-underline font-semibold">Dashboard →</a>
    </nav>

    
    <button id="admin-hamburger-an" class="md:hidden flex items-center justify-center w-9 h-9 rounded-xl border flex-shrink-0" style="border-color:var(--clay-line); background:var(--white); cursor:pointer;" aria-label="Open menu">
      <svg width="18" height="14" viewBox="0 0 18 14" fill="none">
        <rect y="0" width="18" height="2" rx="1" fill="#2B2420"/>
        <rect y="6" width="18" height="2" rx="1" fill="#2B2420"/>
        <rect y="12" width="18" height="2" rx="1" fill="#2B2420"/>
      </svg>
    </button>
  </div>

  
  <div id="admin-mobile-nav-an" style="display:none; background:var(--cream); border-top:1px solid var(--clay-line);">
    <div class="max-w-4xl mx-auto px-5 py-4 flex flex-col gap-2 text-xs font-semibold">
      <a href="menu-manage.html" class="px-4 py-2.5 rounded-xl no-underline text-stone-800 hover:bg-amber-50 transition-colors">📝 Menu Items</a>
      <a href="tables.html" class="px-4 py-2.5 rounded-xl no-underline text-stone-800 hover:bg-amber-50 transition-colors">🪑 Table QRs</a>
      <a href="dashboard.html" class="px-4 py-2.5 rounded-xl no-underline font-semibold hover:bg-amber-50 transition-colors" style="color:var(--saffron-deep)">Dashboard →</a>
    </div>
  </div>
</header>

<script>
  const _hamAn = document.getElementById('admin-hamburger-an');
  const _mobAn = document.getElementById('admin-mobile-nav-an');
  _hamAn.addEventListener('click', () => { _mobAn.style.display = _mobAn.style.display === 'none' ? 'block' : 'none'; });
</script>

  <main class="max-w-4xl mx-auto px-5 py-8">
    <div id="content">
      <p style="color: var(--charcoal-soft)">Loading report…</p>
    </div>
  </main>

  <script src="../js/api.js"></script>
  <script>
    if (!localStorage.getItem("adminToken")) window.location.href = "login.html";
    if (localStorage.getItem("adminRole") !== "owner") {
      document.body.innerHTML = `<main class="max-w-4xl mx-auto px-5 py-8"><p style="color:var(--chili)">Analytics are only visible to the owner account.</p></main>`;
    }

    async function loadReport() {
      const el = document.getElementById("content");
      try {
        const report = await api.getSalesReport();
        el.innerHTML = `
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
          <div class="card p-5">
            <p class="eyebrow mb-1">Total revenue</p>
            <p class="display text-2xl">₹${report.totalRevenue}</p>
          </div>
          <div class="card p-5">
            <p class="eyebrow mb-1">Orders served</p>
            <p class="display text-2xl">${report.totalOrders}</p>
          </div>
          <div class="card p-5">
            <p class="eyebrow mb-1">Avg. order value</p>
            <p class="display text-2xl">₹${report.averageOrderValue}</p>
          </div>
        </div>

        <section class="mb-8">
          <p class="eyebrow mb-3">Top dishes</p>
          <div class="card p-5">
            ${report.topDishes.length === 0 ? `<p class="text-sm" style="color:var(--charcoal-soft)">No served orders yet.</p>` :
            report.topDishes.map((d) => `
                <div class="flex justify-between text-sm py-2" style="border-bottom: 1px solid var(--clay-line);">
                  <span>${d.name}</span>
                  <span style="color: var(--charcoal-soft)">${d.quantitySold} sold · ₹${d.revenue}</span>
                </div>
              `).join("")}
          </div>
        </section>

        <section>
          <p class="eyebrow mb-3">Dish ratings</p>
          <div class="card p-5">
            ${report.dishRatings.length === 0 ? `<p class="text-sm" style="color:var(--charcoal-soft)">No feedback submitted yet.</p>` :
            report.dishRatings.map((d) => `
                <div class="flex justify-between text-sm py-2" style="border-bottom: 1px solid var(--clay-line);">
                  <span>${d.name}</span>
                  <span style="color: var(--charcoal-soft)">★ ${d.averageRating} (${d.totalRatings})</span>
                </div>
              `).join("")}
          </div>
        </section>
      `;
      } catch (err) {
        el.innerHTML = `<p style="color: var(--chili)">${err.message || "Couldn't load the report."}</p>`;
      }
    }

    loadReport();
  </script>
</body>

</html>
