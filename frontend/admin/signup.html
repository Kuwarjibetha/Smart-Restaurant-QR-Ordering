<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Sign Up</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="../css/style.css" />
</head>
<body class="min-h-screen flex items-center justify-center px-5">

<div class="card p-8 w-full max-w-sm">
  <p class="eyebrow mb-1">Restaurant QR</p>
  <h1 class="display text-2xl mb-2">Create owner account</h1>
  <p class="text-sm mb-6" style="color: var(--charcoal-soft)">
    This sets up the restaurant's owner login. Kitchen staff accounts are
    added later from the dashboard — not here.
  </p>

  <label class="text-sm font-semibold block mb-1">Name</label>
  <input id="name" type="text" class="w-full px-3 py-2 rounded-lg text-sm mb-4" style="border:1.5px solid var(--clay-line); background:var(--white); outline:none;" placeholder="Jane Doe" />

  <label class="text-sm font-semibold block mb-1">Email</label>
  <input id="email" type="email" class="w-full px-3 py-2 rounded-lg text-sm mb-4" style="border:1.5px solid var(--clay-line); background:var(--white); outline:none;" placeholder="owner@restaurant.com" />

  <label class="text-sm font-semibold block mb-1">Password</label>
  <input id="password" type="password" class="w-full px-3 py-2 rounded-lg text-sm mb-1" style="border:1.5px solid var(--clay-line); background:var(--white); outline:none;" placeholder="••••••••" />
  <p class="text-xs mb-4" style="color: var(--charcoal-soft)">At least 8 characters.</p>

  <p id="error-msg" class="text-sm mb-3 hidden" style="color: var(--chili)"></p>

  <button id="signup-btn" class="btn-primary w-full py-3 mt-2">Create account</button>

  <p class="text-sm text-center mt-4" style="color: var(--charcoal-soft)">
    Already have an account? <a href="login.html" style="color: var(--charcoal); font-weight:600; text-decoration:none;">Sign in</a>
  </p>
</div>

<script src="../js/api.js"></script>
<script>
  document.getElementById("signup-btn").onclick = async () => {
    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const errorEl = document.getElementById("error-msg");
    const btn = document.getElementById("signup-btn");

    errorEl.classList.add("hidden");

    if (!name || !email || !password) {
      errorEl.textContent = "Name, email, and password are all required.";
      errorEl.classList.remove("hidden");
      return;
    }
    if (password.length < 8) {
      errorEl.textContent = "Password must be at least 8 characters.";
      errorEl.classList.remove("hidden");
      return;
    }

    btn.disabled = true;
    btn.textContent = "Creating account…";

    try {
      // Backend returns { admin, token } on success, same shape as /auth/login,
      // so the new owner is signed in immediately rather than sent back to
      // the login page to re-enter their credentials.
      const { admin, token } = await api.register(name, email, password);
      localStorage.setItem("adminToken", token);
      localStorage.setItem("adminRole", admin.role);
      localStorage.setItem("adminName", admin.name);
      window.location.href = "dashboard.html";
    } catch (err) {
      errorEl.textContent = err.message || "Couldn't create the account.";
      errorEl.classList.remove("hidden");
      btn.disabled = false;
      btn.textContent = "Create account";
    }
  };

  document.getElementById("password").addEventListener("keydown", (e) => {
    if (e.key === "Enter") document.getElementById("signup-btn").click();
  });
</script>
</body>
</html>
