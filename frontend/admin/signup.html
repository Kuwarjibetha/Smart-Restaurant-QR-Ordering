<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Sign Up · Spice Trail</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="../css/style.css" />
</head>
<body class="min-h-screen flex flex-col items-center justify-center px-5 relative" style="background:var(--cream)">


<div class="absolute top-5 left-5 z-20">
  <a href="../index.html" class="btn-secondary px-4 py-2 text-xs no-underline flex items-center gap-1.5 font-semibold">
    <span>←</span> <span>Back to Home</span>
  </a>
</div>

<div class="card p-8 w-full max-w-sm shadow-md">
  <p class="eyebrow mb-1">Spice Trail Setup</p>
  <h1 class="display text-2xl mb-2">Create Owner Account</h1>
  <p class="text-xs mb-6 text-stone-500">
    Sets up the owner login. Kitchen staff accounts are added from the dashboard.
  </p>

  <label class="text-xs font-semibold block mb-1">Full Name</label>
  <input id="name" type="text" class="w-full px-3 py-2 rounded-lg text-xs mb-4" style="border:1.5px solid var(--clay-line); background:var(--white); outline:none;" placeholder="Jane Doe" />

  <label class="text-xs font-semibold block mb-1">Email Address</label>
  <input id="email" type="email" class="w-full px-3 py-2 rounded-lg text-xs mb-4" style="border:1.5px solid var(--clay-line); background:var(--white); outline:none;" placeholder="owner@restaurant.com" />

  <label class="text-xs font-semibold block mb-1">Password</label>
  <input id="password" type="password" class="w-full px-3 py-2 rounded-lg text-xs mb-1" style="border:1.5px solid var(--clay-line); background:var(--white); outline:none;" placeholder="••••••••" />
  <p class="text-[10px] mb-4 text-stone-400">Must be at least 8 characters.</p>

  <p id="error-msg" class="text-xs mb-3 hidden" style="color: var(--chili)"></p>

  <button id="signup-btn" class="btn-primary w-full py-3 mt-2 text-xs font-semibold">Create Account →</button>

  <div class="border-t pt-4 mt-5 text-center" style="border-color:var(--clay-line)">
    <p class="text-xs text-stone-500 mb-2">Already registered?</p>
    <a href="login.html" class="btn-secondary px-4 py-2 text-xs no-underline inline-block font-semibold">Sign In</a>
  </div>
</div>

<script src="../js/api.js"></script>
<script>
  document.getElementById("signup-btn").onclick = async () => {
    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const errorEl = document.getElementById("error-msg");
    const btn = document.getElementById("signup-btn");

    errorEl.classList.add("hidden");

    if (!name || !email || !password) {
      errorEl.textContent = "Name, email, and password are all required.";
      errorEl.classList.remove("hidden");
      return;
    }
    if (password.length < 8) {
      errorEl.textContent = "Password must be at least 8 characters.";
      errorEl.classList.remove("hidden");
      return;
    }

    btn.disabled = true;
    btn.textContent = "Creating account…";

    try {
      const { admin, token } = await api.register(name, email, password);
      localStorage.setItem("adminToken", token);
      localStorage.setItem("adminRole", admin.role);
      localStorage.setItem("adminName", admin.name);
      window.location.href = "dashboard.html";
    } catch (err) {
      errorEl.textContent = err.message || "Couldn't create the account.";
      errorEl.classList.remove("hidden");
      btn.disabled = false;
      btn.textContent = "Create Account →";
    }
  };

  document.getElementById("password").addEventListener("keydown", (e) => {
    if (e.key === "Enter") document.getElementById("signup-btn").click();
  });
</script>
</body>
</html>
