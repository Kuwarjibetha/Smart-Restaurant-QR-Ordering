<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Table QR Codes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link rel="stylesheet" href="../css/style.css" />
<style>
  @media print {
    header, #controls, #origin-banner, .no-print { display: none !important; }
    body { background: white !important; }
    .qr-card { break-inside: avoid; border: 1.5px dashed #999 !important; }
  }
  .qr-card canvas { margin: 0 auto; }
</style>
</head>
<body>

<header class="sticky top-0 z-30" style="background: var(--cream); border-bottom: 1px solid var(--clay-line);">
  <div class="max-w-5xl mx-auto px-5 py-4 flex items-center justify-between">
    <div>
      <p class="eyebrow">Setup</p>
      <h1 class="display text-2xl">Table QR Codes</h1>
    </div>
    <nav class="flex items-center gap-4 text-sm font-semibold">
      <a href="dashboard.html" style="color: var(--charcoal); text-decoration:none;">← Dashboard</a>
    </nav>
  </div>
</header>

<main class="max-w-5xl mx-auto px-5 py-8">

  <div id="origin-banner" class="card p-4 mb-6 text-sm"></div>

  <div id="controls" class="card p-5 mb-8 flex flex-wrap items-end gap-4">
    <div>
      <label class="text-sm font-semibold block mb-1">Number of tables</label>
      <input id="table-count" type="number" min="1" max="100" value="10"
        class="px-3 py-2 rounded-lg text-sm w-28" style="border:1.5px solid var(--clay-line); background:var(--white); outline:none;" />
    </div>
    <button id="generate-btn" class="btn-primary px-4 py-2">Generate</button>
    <button id="print-btn" class="btn-secondary px-4 py-2">Print / Save as PDF</button>
  </div>

  <div id="qr-grid" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
</main>

<script>
  // Build the base URL from wherever THIS page was loaded from — if you open
  // it via your computer's LAN IP, the QR codes will encode that IP, so
  // phones on the same Wi-Fi can actually reach it. If you open it via
  // "localhost", the QR codes will be useless to any other device.
  const origin = window.location.origin;
  const isLocalhost = /^(https?:\/\/)?(localhost|127\.0\.0\.1|\[::1?\])/i.test(origin);

  const banner = document.getElementById("origin-banner");
  if (isLocalhost) {
    banner.innerHTML = `
      ⚠️ <strong>You opened this page via "localhost"</strong> — the QR codes below will only work on
      <em>this</em> computer, not on customers' phones.<br/>
      To make them scannable, find this computer's local network (Wi-Fi) IP address and reload this
      page using that instead, e.g. <code>http://192.168.1.42:3000/admin/tables.html</code>.<br/>
      <span style="color: var(--charcoal-soft)">
        Mac: System Settings → Wi-Fi → Details → IP Address (or run <code>ipconfig getifaddr en0</code> in Terminal).<br/>
        Windows: run <code>ipconfig</code> in Command Prompt and look for "IPv4 Address".
      </span>`;
    banner.style.borderColor = "var(--chili)";
  } else {
    banner.innerHTML = `✅ Generating QR codes for <strong>${origin}</strong> — make sure customers' phones are on the same Wi-Fi network as this computer.`;
    banner.style.borderColor = "var(--cardamom)";
  }

  function generate() {
    const count = Math.max(1, Math.min(100, Number(document.getElementById("table-count").value) || 10));
    const grid = document.getElementById("qr-grid");
    grid.innerHTML = "";

    for (let table = 1; table <= count; table++) {
      const url = `${origin}/customer/menu.html?table=${table}`;

      const card = document.createElement("div");
      card.className = "card qr-card p-4 text-center";
      card.innerHTML = `
        <p class="eyebrow mb-2">Table ${table}</p>
        <div class="qr-box flex justify-center mb-2"></div>
        <p class="text-xs break-all" style="color: var(--charcoal-soft)">${url}</p>
      `;
      grid.appendChild(card);

      new QRCode(card.querySelector(".qr-box"), {
        text: url,
        width: 160,
        height: 160,
        colorDark: "#2B2420",
        colorLight: "#FFFDF9",
      });
    }
  }

  document.getElementById("generate-btn").onclick = generate;
  document.getElementById("print-btn").onclick = () => window.print();

  generate();
</script>
</body>
</html>
