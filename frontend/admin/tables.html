<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Table QR Codes · Spice Trail Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link rel="stylesheet" href="../css/style.css" />
<style>
  @media print {
    header, #controls, #origin-banner, .no-print { display: none !important; }
    body { background: white !important; }
    .qr-card { break-inside: avoid; border: 1.5px dashed #999 !important; }
  }
  .qr-card canvas { margin: 0 auto; }
</style>
</head>
<body class="pb-16" style="background:var(--cream)">

<header class="sticky top-0 z-30 shadow-sm" style="background: var(--cream); border-bottom: 1px solid var(--clay-line);">
  <div class="max-w-5xl mx-auto px-5 py-3.5 flex items-center justify-between gap-4">

    
    <div class="flex items-center gap-3 min-w-0">
      <a href="../index.html" class="flex items-center gap-2 no-underline flex-shrink-0" style="color:var(--charcoal)">
        <span class="text-xl">🌿</span>
        <span class="display text-base font-bold hidden sm:inline">Spice Trail</span>
      </a>
      <span class="text-stone-300 hidden sm:inline">|</span>
      <div class="min-w-0">
        <p class="eyebrow leading-none truncate">Table Management</p>
        <h1 class="display text-lg font-bold leading-tight truncate">Generate Table QR Codes</h1>
      </div>
    </div>

    
    <nav class="hidden md:flex items-center gap-3 text-xs font-semibold flex-shrink-0">
      <a href="menu-manage.html" class="no-underline text-stone-700 hover:text-stone-900 transition-colors">Menu Items</a>
      <a href="analytics.html" class="no-underline text-stone-700 hover:text-stone-900 transition-colors">Analytics</a>
      <a href="dashboard.html" class="btn-secondary px-3 py-1.5 text-xs no-underline font-semibold">Dashboard →</a>
    </nav>

    
    <button id="admin-hamburger-tbl" class="md:hidden flex items-center justify-center w-9 h-9 rounded-xl border flex-shrink-0" style="border-color:var(--clay-line); background:var(--white); cursor:pointer;" aria-label="Open menu">
      <svg width="18" height="14" viewBox="0 0 18 14" fill="none">
        <rect y="0" width="18" height="2" rx="1" fill="#2B2420"/>
        <rect y="6" width="18" height="2" rx="1" fill="#2B2420"/>
        <rect y="12" width="18" height="2" rx="1" fill="#2B2420"/>
      </svg>
    </button>
  </div>

  
  <div id="admin-mobile-nav-tbl" style="display:none; background:var(--cream); border-top:1px solid var(--clay-line);">
    <div class="max-w-5xl mx-auto px-5 py-4 flex flex-col gap-2 text-xs font-semibold">
      <a href="menu-manage.html" class="px-4 py-2.5 rounded-xl no-underline text-stone-800 hover:bg-amber-50 transition-colors">📝 Menu Items</a>
      <a href="analytics.html" class="px-4 py-2.5 rounded-xl no-underline text-stone-800 hover:bg-amber-50 transition-colors">📈 Analytics</a>
      <a href="dashboard.html" class="px-4 py-2.5 rounded-xl no-underline font-semibold hover:bg-amber-50 transition-colors" style="color:var(--saffron-deep)">Dashboard →</a>
    </div>
  </div>
</header>

<script>
  const _hamTbl = document.getElementById('admin-hamburger-tbl');
  const _mobTbl = document.getElementById('admin-mobile-nav-tbl');
  _hamTbl.addEventListener('click', () => { _mobTbl.style.display = _mobTbl.style.display === 'none' ? 'block' : 'none'; });
</script>

<main class="max-w-5xl mx-auto px-5 py-6 space-y-6">

  <div id="origin-banner" class="card p-4 text-xs"></div>

  <div id="controls" class="card p-5 shadow-sm flex flex-wrap items-end gap-4">
    <div>
      <label class="text-xs font-semibold block mb-1">Number of Tables</label>
      <input id="table-count" type="number" min="1" max="100" value="10"
        class="px-3 py-2 rounded-lg text-xs w-28" style="border:1.5px solid var(--clay-line); background:var(--white); outline:none;" />
    </div>
    <button id="generate-btn" class="btn-primary px-5 py-2.5 text-xs font-semibold">Generate QRs →</button>
    <button id="print-btn" class="btn-secondary px-4 py-2.5 text-xs font-semibold">Print / Save as PDF 🖨️</button>
  </div>

  <div id="qr-grid" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
</main>

<script src="../js/api.js"></script>
<script>
  const origin = window.location.origin;
  const isLocalhost = /^(https?:\/\/)?(localhost|127\.0\.0\.1|\[::1?\])/i.test(origin);

  const banner = document.getElementById("origin-banner");
  if (isLocalhost) {
    banner.innerHTML = `
      ⚠️ <strong>You opened this page via "localhost"</strong> — the QR codes below will work on this computer.<br/>
      To test on real phones on the same Wi-Fi, find your computer's IP address (e.g. <code>http://192.168.1.42:3000/admin/tables.html</code>).
    `;
    banner.style.borderColor = "var(--saffron)";
  } else {
    banner.innerHTML = `✅ Generating QR codes for <strong>${origin}</strong> — customers scanning these will be sent directly to their secure unguessable table menu.`;
    banner.style.borderColor = "var(--cardamom)";
  }

  function generateRandomCode(num) {
    return `tbl_${num}_` + Array.from(crypto.getRandomValues(new Uint8Array(4)), b => b.toString(16).padStart(2, '0')).join('');
  }

  async function generate() {
    const count = Math.max(1, Math.min(100, Number(document.getElementById("table-count").value) || 10));
    const grid = document.getElementById("qr-grid");
    grid.innerHTML = "<p class='col-span-full text-center text-xs text-stone-500 py-4'>Loading secure table codes...</p>";

    let dbTablesMap = {};
    try {
      const { tables } = await api.getTables();
      if (tables) {
        tables.forEach(t => { dbTablesMap[t.tableNumber] = t.tableCode; });
      }
    } catch (e) {
      console.warn("Using offline table code generator fallback");
    }

    grid.innerHTML = "";

    for (let table = 1; table <= count; table++) {
      const tableCode = dbTablesMap[table] || generateRandomCode(table);
      const url = `${origin}/customer/menu.html?table=${tableCode}`;

      const card = document.createElement("div");
      card.className = "card qr-card p-4 text-center shadow-sm";
      card.innerHTML = `
        <p class="eyebrow mb-1">Table ${table}</p>
        <p class="text-[10px] font-mono text-stone-400 mb-2">${tableCode}</p>
        <div class="qr-box flex justify-center mb-2"></div>
        <p class="text-[11px] break-all" style="color: var(--charcoal-soft)">${url}</p>
      `;
      grid.appendChild(card);

      new QRCode(card.querySelector(".qr-box"), {
        text: url,
        width: 150,
        height: 150,
        colorDark: "#2B2420",
        colorLight: "#FFFDF9",
      });
    }
  }

  document.getElementById("generate-btn").onclick = generate;
  document.getElementById("print-btn").onclick = () => window.print();

  generate();
</script>
</body>
</html>
