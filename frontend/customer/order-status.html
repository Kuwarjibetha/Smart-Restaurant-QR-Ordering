<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Live Order Status · Spice Trail</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="../js/socket.io.min.js"></script>
<link rel="stylesheet" href="../css/style.css" />
</head>
<body class="pb-20" style="background:var(--cream)">

<header class="sticky top-0 z-30 shadow-sm" style="background: var(--cream); border-bottom: 1px solid var(--clay-line);">
  <div class="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between">
    <div>
      <span id="table-label" class="eyebrow">Table —</span>
      <h1 class="display text-xl font-bold">Order Tracker</h1>
    </div>
    <a href="menu.html" id="order-more-header" class="btn-secondary px-3 py-1.5 text-xs no-underline font-semibold flex items-center gap-1">
      <span>+</span> <span>Add More Dishes</span>
    </a>
  </div>
</header>

<main class="max-w-3xl mx-auto px-4 pt-6 space-y-6">

  <!-- Spice Trail Stepper Card -->
  <section class="card p-6 shadow-sm">
    <h2 class="eyebrow text-center mb-6">Kitchen Status Pipeline</h2>
    <div class="spice-trail mb-6">
      <div class="stage" data-status="placed">
        <div class="line"></div>
        <div class="dot">📝</div>
        <div class="label">Placed</div>
      </div>
      <div class="stage" data-status="preparing">
        <div class="line"></div>
        <div class="dot">🔥</div>
        <div class="label">Preparing</div>
      </div>
      <div class="stage" data-status="served">
        <div class="dot">🍽️</div>
        <div class="label">Served</div>
      </div>
    </div>
    <p class="text-center text-xs font-semibold py-2 px-4 rounded-full mx-auto w-fit" id="status-message" style="background:var(--cream-deep); color: var(--charcoal); border:1px solid var(--clay-line)">Loading your order status…</p>
  </section>

  <!-- Order Items Summary Card -->
  <section id="order-details" class="card p-6 shadow-sm"></section>

  <!-- Dish Rating & Feedback Section -->
  <section id="feedback-section" class="card p-6 shadow-sm hidden">
    <h2 class="eyebrow mb-1">Rate Your Dishes</h2>
    <p class="text-xs text-stone-500 mb-4">How was your food? Let the chef know!</p>
    <div id="feedback-items" class="space-y-3"></div>
    <button id="submit-feedback-btn" class="btn-primary w-full py-3 mt-4 text-xs font-semibold">Submit Review ⭐</button>
    <p id="feedback-thanks" class="text-center text-xs mt-3 hidden font-semibold" style="color: var(--cardamom);">Thanks — that helps the kitchen! 🌿</p>
  </section>

  <a href="menu.html" id="order-more-link" class="btn-secondary block text-center py-3 text-xs no-underline font-semibold">Back to Menu</a>
</main>

<script src="../js/api.js"></script>
<script src="../js/socketClient.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const tableNumber = Number(params.get("table")) || 1;
  const orderId = params.get("order");

  document.getElementById("table-label").textContent = `Table ${tableNumber}`;
  document.getElementById("order-more-link").href = `menu.html?table=${tableNumber}`;
  document.getElementById("order-more-header").href = `menu.html?table=${tableNumber}`;

  const STAGES = ["placed", "preparing", "served"];

  function paintStatus(status) {
    const currentIndex = STAGES.indexOf(status);
    document.querySelectorAll(".spice-trail .stage").forEach((el, i) => {
      el.classList.remove("active", "done");
      if (i < currentIndex) el.classList.add("done");
      else if (i === currentIndex) el.classList.add("active");
    });

    const messages = {
      placed: "📝 Your order has been sent to the kitchen.",
      preparing: "🔥 The kitchen is preparing your dishes right now!",
      served: "🍽️ Order served! Enjoy your meal!",
    };
    document.getElementById("status-message").textContent = messages[status] || "";

    if (status === "served") {
      document.getElementById("feedback-section").classList.remove("hidden");
    }
  }

  function renderOrderDetails(order) {
    const el = document.getElementById("order-details");
    el.innerHTML = `
      <div class="flex justify-between items-center mb-3 pb-2" style="border-bottom:1px solid var(--clay-line)">
        <p class="eyebrow">Order Items</p>
        <span class="text-xs font-bold px-2.5 py-1 rounded-full" style="background:var(--cream-deep); color:var(--charcoal-soft); border:1px solid var(--clay-line)">⏱ ~${order.estimatedWaitTime || 15} min wait</span>
      </div>

      <div class="space-y-2 mb-3">
        ${order.items.map((i) => `
          <div class="flex items-center justify-between text-xs py-1">
            <div class="flex items-center gap-2">
              <span class="font-bold px-2 py-0.5 rounded text-xs" style="background:var(--saffron); color:var(--white)">${i.quantity}×</span>
              <span class="font-semibold" style="color:var(--charcoal)">${i.name}</span>
            </div>
            <span class="font-bold" style="color:var(--charcoal-soft)">₹${i.price * i.quantity}</span>
          </div>
        `).join("")}
      </div>

      <div class="flex justify-between font-bold text-sm pt-3" style="border-top: 1px solid var(--clay-line);">
        <span>Total Amount</span>
        <span style="color:var(--saffron-deep)">₹${order.totalAmount}</span>
      </div>
    `;

    renderFeedbackForm(order);
  }

  function renderFeedbackForm(order) {
    const container = document.getElementById("feedback-items");
    container.innerHTML = "";
    order.items.forEach((item) => {
      const row = document.createElement("div");
      row.className = "flex items-center justify-between p-3 rounded-lg border bg-white";
      row.style.borderColor = "var(--clay-line)";
      row.innerHTML = `
        <span class="text-xs font-semibold">${item.name}</span>
        <div class="flex gap-1" data-menu-item-id="${item.menuItemId}">
          ${[1,2,3,4,5].map((n) => `<button class="star" data-value="${n}" style="font-size:1.2rem; background:none; border:none; cursor:pointer; opacity:0.35;">★</button>`).join("")}
        </div>
      `;
      const stars = row.querySelectorAll(".star");
      stars.forEach((star) => {
        star.onclick = () => {
          const value = Number(star.dataset.value);
          stars.forEach((s) => (s.style.opacity = Number(s.dataset.value) <= value ? "1" : "0.35"));
          row.querySelector("[data-menu-item-id]").dataset.selected = value;
        };
      });
      container.appendChild(row);
    });
  }

  document.getElementById("submit-feedback-btn").onclick = async () => {
    const rows = document.querySelectorAll("#feedback-items [data-menu-item-id]");
    const ratings = Array.from(rows)
      .filter((r) => r.dataset.selected)
      .map((r) => ({ menuItemId: r.dataset.menuItemId, stars: Number(r.dataset.selected) }));

    if (ratings.length === 0) return;

    try {
      await api.submitFeedback(orderId, ratings);
      document.getElementById("feedback-thanks").classList.remove("hidden");
      document.getElementById("submit-feedback-btn").disabled = true;
    } catch (err) {
      alert(err.message || "Couldn't submit feedback.");
    }
  };

  async function loadInitialStatus() {
    try {
      const { orders } = await api.getOrdersForTable(tableNumber);
      const order = orderId ? orders.find((o) => o._id === orderId) : orders[0];
      if (order) {
        paintStatus(order.status);
        renderOrderDetails(order);
      } else {
        document.getElementById("status-message").textContent = "No recent order found for this table.";
      }
    } catch (err) {
      document.getElementById("status-message").textContent = "Couldn't load order status.";
    }
  }

  loadInitialStatus();

  const socket = connectAsCustomer(tableNumber, (order) => {
    if (!orderId || order._id === orderId) {
      paintStatus(order.status);
      renderOrderDetails(order);
    }
  });

  setInterval(() => {
    if (!socket || !socket.connected) {
      loadInitialStatus();
    }
  }, 8000);
</script>
</body>
</html>
