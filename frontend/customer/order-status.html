<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Live Order Status · Spice Trail</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="../js/socket.io.min.js"></script>
<link rel="stylesheet" href="../css/style.css" />
</head>
<body class="pb-20" style="background:var(--cream)">

<header class="sticky top-0 z-30 shadow-sm" style="background: var(--cream); border-bottom: 1px solid var(--clay-line);">
  <div class="max-w-3xl mx-auto px-3 sm:px-4 py-2.5 flex items-center justify-between gap-2">
    <div class="flex items-center gap-2 min-w-0 flex-shrink-0">
      <a id="back-to-menu-header" href="menu.html" class="btn-secondary px-2.5 py-1.5 text-xs no-underline flex items-center gap-1 font-semibold whitespace-nowrap">
        <span>←</span> <span>Menu</span>
      </a>
      <div class="min-w-0">
        <span id="table-label" class="eyebrow text-[10px] sm:text-xs block">Table —</span>
        <h1 class="display text-base sm:text-xl font-bold whitespace-nowrap leading-tight">Order Tracker</h1>
      </div>
    </div>
    <a href="menu.html" id="order-more-header" class="btn-secondary px-2.5 py-1.5 text-xs no-underline font-semibold flex items-center gap-1 whitespace-nowrap flex-shrink-0">
      <span>+</span> <span class="hidden sm:inline">Add</span> <span>More</span>
    </a>
  </div>
</header>


<main class="max-w-3xl mx-auto px-4 pt-6 space-y-6">

  
  <div id="orders-tabs-container" class="hidden">
    <p class="eyebrow mb-2">Orders for this table:</p>
    <div id="orders-tabs" class="flex gap-2 overflow-x-auto pb-1"></div>
  </div>

  
  <section class="card p-6 shadow-sm">
    <div class="flex items-center justify-between mb-6">
      <h2 class="eyebrow">Kitchen Status Pipeline</h2>
      <button id="refresh-status-btn" class="text-xs font-semibold hover:underline flex items-center gap-1" style="color:var(--saffron-deep)" onclick="loadInitialStatus()">
        <span>🔄 Refresh</span>
      </button>
    </div>
    <div class="spice-trail mb-6">
      <div class="stage" data-status="placed">
        <div class="line"></div>
        <div class="dot">📝</div>
        <div class="label">Placed</div>
      </div>
      <div class="stage" data-status="preparing">
        <div class="line"></div>
        <div class="dot">🔥</div>
        <div class="label">Preparing</div>
      </div>
      <div class="stage" data-status="served">
        <div class="dot">🍽️</div>
        <div class="label">Served</div>
      </div>
    </div>
    <p class="text-center text-xs font-semibold py-2 px-4 rounded-full mx-auto w-fit transition-all" id="status-message" style="background:var(--cream-deep); color: var(--charcoal); border:1px solid var(--clay-line)">Loading your order status…</p>
  </section>

  
  <section id="order-details" class="card p-6 shadow-sm">
    <p class="text-xs text-stone-500 text-center py-4">Fetching order details...</p>
  </section>

  <section id="feedback-section" class="card p-6 shadow-sm hidden">
    <h2 class="eyebrow mb-1">Rate Your Dishes</h2>
    <p class="text-xs text-stone-500 mb-4">How was your food? Let the chef know!</p>
    <div id="feedback-items" class="space-y-3"></div>
    <button id="submit-feedback-btn" class="btn-primary w-full py-3 mt-4 text-xs font-semibold">Submit Review ⭐</button>
    <p id="feedback-thanks" class="text-center text-xs mt-3 hidden font-semibold" style="color: var(--cardamom);">Thanks — that helps the kitchen! 🌿</p>
  </section>

  <a href="menu.html" id="order-more-link" class="btn-secondary block text-center py-3 text-xs no-underline font-semibold">Back to Menu</a>
</main>

<script src="../js/api.js"></script>
<script src="../js/cart.js"></script>
<script src="../js/socketClient.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const rawTableIdentifier = params.get("table");
  const hasTable = !!rawTableIdentifier;
  let activeTableIdentifier = rawTableIdentifier;
  let activeTableNumber = null;
  let requestedOrderId = params.get("order");

  if (requestedOrderId) {
    addMyOrderId(requestedOrderId);
  }

  if (!hasTable) {

    document.querySelector("main").innerHTML = `
      <div style="
        max-width:420px; margin:60px auto; text-align:center;
        padding:40px 24px; background:var(--white);
        border:2px solid #F59E0B; border-radius:20px; box-shadow:0 8px 32px rgba(43,36,32,0.10);
      ">
        <div style="font-size:3rem; margin-bottom:16px">📱</div>
        <h2 style="font-family:var(--font-display); font-size:1.3rem; color:var(--charcoal); margin-bottom:10px">
          No table found
        </h2>
        <p style="font-size:0.8rem; color:var(--charcoal-soft); line-height:1.6; margin-bottom:24px">
          Order tracking is linked to a specific table. Please scan the
          <strong>QR code at your table</strong> to view your live order status.
        </p>
        <a href="menu.html" class="btn-secondary" style="display:inline-block; padding:10px 24px; text-decoration:none; font-size:0.8rem">
          ← Back to Menu
        </a>
      </div>
    `;

    throw new Error("[QR Gate] No table identifier — halting order-status page load.");
  }

  let currentOrder = null;
  let allTableOrders = [];

  async function initOrderStatusTable() {
    try {
      const tableData = await api.resolveTable(rawTableIdentifier);
      if (tableData && tableData.tableNumber) {
        activeTableNumber = tableData.tableNumber;
        activeTableIdentifier = tableData.tableCode || rawTableIdentifier;

        document.getElementById("table-label").textContent = `Table ${activeTableNumber}`;
        document.getElementById("order-more-link").href = `menu.html?table=${activeTableIdentifier}`;
        document.getElementById("order-more-header").href = `menu.html?table=${activeTableIdentifier}`;
        document.getElementById("back-to-menu-header").href = `menu.html?table=${activeTableIdentifier}`;
      }
    } catch (e) {
      const fallbackNum = Number(rawTableIdentifier);
      if (!isNaN(fallbackNum) && fallbackNum > 0) {
        document.getElementById("table-label").textContent = `Table ${fallbackNum}`;
      }
    }
    loadInitialStatus();
  }

  const STAGES = ["placed", "preparing", "served"];

  function paintStatus(status) {
    const currentIndex = STAGES.indexOf(status);
    document.querySelectorAll(".spice-trail .stage").forEach((el, i) => {
      el.classList.remove("active", "done");
      if (i < currentIndex) el.classList.add("done");
      else if (i === currentIndex) el.classList.add("active");
    });

    const messages = {
      placed: "📝 Your order has been sent to the kitchen.",
      preparing: "🔥 The kitchen is preparing your dishes right now!",
      served: "🍽️ Order served! Enjoy your meal!",
    };
    document.getElementById("status-message").textContent = messages[status] || `Status: ${status}`;

    if (status === "served") {
      document.getElementById("feedback-section").classList.remove("hidden");
    } else {
      document.getElementById("feedback-section").classList.add("hidden");
    }
  }

  function renderOrderTabs(orders, selectedOrderId) {
    const container = document.getElementById("orders-tabs-container");
    const tabs = document.getElementById("orders-tabs");
    if (!orders || orders.length <= 1) {
      container.classList.add("hidden");
      return;
    }
    container.classList.remove("hidden");
    tabs.innerHTML = orders.map((o, idx) => {
      const isSelected = o._id === selectedOrderId;
      const statusEmoji = o.status === "served" ? "🍽️" : o.status === "preparing" ? "🔥" : "📝";
      const totalItems = (o.items || []).reduce((n, i) => n + i.quantity, 0);
      return `
        <button onclick="selectOrder('${o._id}')" class="px-3.5 py-1.5 rounded-full text-xs font-semibold transition-all shrink-0 flex items-center gap-1.5 ${
          isSelected ? "bg-stone-900 text-white shadow-sm" : "bg-white text-stone-700 border border-stone-200 hover:bg-stone-50"
        }">
          <span>${statusEmoji} Order #${orders.length - idx}</span>
          <span class="text-[10px] opacity-80">(${totalItems} items · ₹${o.totalAmount})</span>
        </button>
      `;
    }).join("");
  }

  function selectOrder(id) {
    const found = allTableOrders.find((o) => o._id === id);
    if (found) {
      currentOrder = found;
      requestedOrderId = found._id;
      paintStatus(currentOrder.status);
      renderOrderDetails(currentOrder);
      renderOrderTabs(allTableOrders, currentOrder._id);
    }
  }

  function renderOrderDetails(order) {
    const el = document.getElementById("order-details");
    el.innerHTML = `
      <div class="flex justify-between items-center mb-3 pb-2" style="border-bottom:1px solid var(--clay-line)">
        <div class="flex items-center gap-2">
          <p class="eyebrow">Order Summary</p>
          <span class="text-[10px] text-stone-400 font-mono">#${order._id.slice(-6)}</span>
        </div>
        <span class="text-xs font-bold px-2.5 py-1 rounded-full" style="background:var(--cream-deep); color:var(--charcoal-soft); border:1px solid var(--clay-line)">⏱ ~${order.estimatedWaitTime || 15} min wait</span>
      </div>

      <div class="space-y-2 mb-3">
        ${order.items.map((i) => `
          <div class="flex items-center justify-between text-xs py-1">
            <div class="flex items-center gap-2">
              <span class="font-bold px-2 py-0.5 rounded text-xs" style="background:var(--saffron); color:var(--white)">${i.quantity}×</span>
              <span class="font-semibold" style="color:var(--charcoal)">${i.name}</span>
            </div>
            <span class="font-bold" style="color:var(--charcoal-soft)">₹${i.price * i.quantity}</span>
          </div>
        `).join("")}
      </div>

      <div class="flex justify-between font-bold text-sm pt-3" style="border-top: 1px solid var(--clay-line);">
        <span>Total Amount</span>
        <span style="color:var(--saffron-deep)">₹${order.totalAmount}</span>
      </div>
    `;

    renderFeedbackForm(order);
  }

  function renderFeedbackForm(order) {
    const container = document.getElementById("feedback-items");
    container.innerHTML = "";
    order.items.forEach((item) => {
      const row = document.createElement("div");
      row.className = "flex items-center justify-between p-3 rounded-lg border bg-white";
      row.style.borderColor = "var(--clay-line)";
      row.innerHTML = `
        <span class="text-xs font-semibold">${item.name}</span>
        <div class="flex gap-1" data-menu-item-id="${item.menuItemId}">
          ${[1,2,3,4,5].map((n) => `<button class="star" data-value="${n}" style="font-size:1.2rem; background:none; border:none; cursor:pointer; opacity:0.35;">★</button>`).join("")}
        </div>
      `;
      const stars = row.querySelectorAll(".star");
      stars.forEach((star) => {
        star.onclick = () => {
          const value = Number(star.dataset.value);
          stars.forEach((s) => (s.style.opacity = Number(s.dataset.value) <= value ? "1" : "0.35"));
          row.querySelector("[data-menu-item-id]").dataset.selected = value;
        };
      });
      container.appendChild(row);
    });
  }

  document.getElementById("submit-feedback-btn").onclick = async () => {
    if (!currentOrder) return;
    const rows = document.querySelectorAll("#feedback-items [data-menu-item-id]");
    const ratings = Array.from(rows)
      .filter((r) => r.dataset.selected)
      .map((r) => ({ menuItemId: r.dataset.menuItemId, stars: Number(r.dataset.selected) }));

    if (ratings.length === 0) return;

    try {
      await api.submitFeedback(currentOrder._id, ratings);
      document.getElementById("feedback-thanks").classList.remove("hidden");
      document.getElementById("submit-feedback-btn").disabled = true;
    } catch (err) {
      alert(err.message || "Couldn't submit feedback.");
    }
  };

  async function loadInitialStatus(isBackground = false) {
    try {
      const { orders, tableNumber, tableCode } = await api.getOrdersForTable(activeTableIdentifier);
      if (tableNumber) {
        activeTableNumber = tableNumber;
        document.getElementById("table-label").textContent = `Table ${tableNumber}`;
      }
      if (tableCode) activeTableIdentifier = tableCode;

      const customerOrders = filterCustomerOrders(orders);

      if (customerOrders && customerOrders.length > 0) {
        allTableOrders = customerOrders;
        let order = requestedOrderId ? customerOrders.find((o) => o._id === requestedOrderId) : null;
        if (!order) {
          order = customerOrders[0];
        }
        currentOrder = order;
        paintStatus(order.status);
        renderOrderDetails(order);
        renderOrderTabs(customerOrders, order._id);
      } else {
        document.getElementById("status-message").textContent = `No active orders found for you at Table ${activeTableNumber || ""}.`;
        document.getElementById("order-details").innerHTML = `
          <div class="text-center py-6">
            <p class="text-3xl mb-2">🍽️</p>
            <p class="font-semibold text-sm">No order history found for your session</p>
            <p class="text-xs text-stone-500 mt-1">Browse our menu and place your order!</p>
            <a href="menu.html?table=${activeTableIdentifier}" class="btn-primary inline-block px-5 py-2.5 mt-4 text-xs font-semibold no-underline">Browse Menu →</a>
          </div>
        `;
      }
    } catch (err) {
      console.warn("Failed to load order status:", err);
      if (!currentOrder && !isBackground) {
        document.getElementById("status-message").textContent = "Couldn't load order status.";
        document.getElementById("order-details").innerHTML = `
          <div class="text-center py-6">
            <p class="text-xs text-stone-500 mb-3">Unable to connect to kitchen server.</p>
            <button onclick="loadInitialStatus()" class="btn-secondary px-4 py-2 text-xs font-semibold">🔄 Try Again</button>
          </div>
        `;
      }
    }
  }

  initOrderStatusTable();

  const socket = connectAsCustomer(rawTableIdentifier, (order) => {
    if (!order) return;
    const myIds = getMyOrderIds();
    if (myIds.includes(order._id) || (requestedOrderId && order._id === requestedOrderId) || filterCustomerOrders([order]).length > 0) {
      if (!requestedOrderId || order._id === requestedOrderId || (currentOrder && currentOrder._id === order._id)) {
        currentOrder = order;
        paintStatus(order.status);
        renderOrderDetails(order);
      }
      const idx = allTableOrders.findIndex((o) => o._id === order._id);
      if (idx !== -1) allTableOrders[idx] = order;
      else allTableOrders.unshift(order);
      renderOrderTabs(allTableOrders, currentOrder ? currentOrder._id : null);
    }
  });

  setInterval(() => {
    if (!socket || !socket.connected) {
      loadInitialStatus(true);
    }
  }, 8000);
</script>
</body>
</html>
