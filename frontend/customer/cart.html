<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Cart · Spice Trail</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="pb-32" style="background:var(--cream)">

  <header class="sticky top-0 z-30 shadow-sm" style="background: var(--cream); border-bottom: 1px solid var(--clay-line);">
    <div class="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <a id="back-link" href="menu.html" class="btn-secondary px-3 py-1.5 text-xs no-underline flex items-center gap-1 font-semibold">
          <span>←</span> <span>Back to Menu</span>
        </a>
        <h1 class="display text-xl font-bold">Review Your Cart</h1>
      </div>
      <span id="table-label" class="text-xs font-semibold px-2.5 py-1 rounded-full"
        style="background:var(--cream-deep); border:1px solid var(--clay-line); color:var(--saffron-deep)">Table —</span>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-4 pt-6">

    <!-- Empty Cart State -->
    <div id="empty-state" class="card p-10 text-center max-w-md mx-auto my-8 hidden shadow-sm">
      <p class="text-4xl mb-3">🧺</p>
      <h2 class="display text-xl mb-1">Your cart is empty</h2>
      <p class="text-xs text-stone-500 mb-6">Explore our menu and pick something delicious!</p>
      <a id="empty-menu-link" href="menu.html" class="btn-primary inline-block px-6 py-2.5 text-xs no-underline font-semibold">
        Browse Menu →
      </a>
    </div>

    <!-- 2-Column Split Cart Content -->
    <div id="cart-content-wrapper" class="grid grid-cols-1 md:grid-cols-3 gap-6">
      
      <!-- Cart items list (Left side - 2 cols) -->
      <div class="md:col-span-2 space-y-3">
        <h2 class="eyebrow mb-2">Selected Items</h2>
        <div id="cart-items" class="space-y-3"></div>
      </div>

      <!-- Order Summary Card (Right side - 1 col) -->
      <div id="summary-card" class="card p-5 h-fit sticky top-20 shadow-sm">
        <h2 class="eyebrow mb-3">Payment Summary</h2>
        
        <div class="space-y-2 text-xs border-b pb-3 mb-3" style="border-color: var(--clay-line)">
          <div class="flex justify-between text-stone-600">
            <span>Items Subtotal</span>
            <span id="subtotal-amount" class="font-semibold">₹0</span>
          </div>
          <div class="flex justify-between text-stone-600">
            <span>Taxes &amp; Charges</span>
            <span>Included</span>
          </div>
        </div>

        <div class="flex justify-between items-center mb-6">
          <span class="font-bold text-sm">Grand Total</span>
          <span id="cart-total" class="display text-2xl font-bold" style="color:var(--saffron-deep)">₹0</span>
        </div>

        <button id="place-order-btn" class="btn-primary w-full py-3 text-xs font-semibold shadow-md">
          Send Order to Kitchen 🔥
        </button>
        <p class="text-center text-[10px] text-stone-400 mt-2">No advance payment required. Pay at your table after meal.</p>
      </div>

    </div>

  </main>

  <script src="../js/api.js"></script>
  <script src="../js/cart.js"></script>
  <script>
    const tableNumber = getTableNumberFromUrl() || 1;
    document.getElementById("table-label").textContent = `Table ${tableNumber}`;
    document.getElementById("back-link").href = `menu.html?table=${tableNumber}`;
    document.getElementById("empty-menu-link").href = `menu.html?table=${tableNumber}`;

    function render() {
      const cart = getCart(tableNumber);
      const container = document.getElementById("cart-items");
      const empty = document.getElementById("empty-state");
      const contentWrapper = document.getElementById("cart-content-wrapper");

      if (cart.length === 0) {
        container.innerHTML = "";
        empty.classList.remove("hidden");
        contentWrapper.classList.add("hidden");
        return;
      }
      empty.classList.add("hidden");
      contentWrapper.classList.remove("hidden");

      container.innerHTML = "";
      cart.forEach((item) => {
        const card = document.createElement("div");
        card.className = "card p-4 flex items-center justify-between gap-4 shadow-sm";
        card.innerHTML = `
          <div class="flex-1">
            <h3 class="font-bold text-sm" style="color: var(--charcoal)">${item.name}</h3>
            <p class="text-xs text-stone-500 mt-0.5">₹${item.price} each</p>
            <p class="text-xs font-bold mt-1" style="color: var(--saffron-deep)">Subtotal: ₹${item.price * item.quantity}</p>
          </div>

          <div class="flex items-center gap-2 px-3 py-1.5 rounded-lg shrink-0" style="background:var(--cream-deep); border:1px solid var(--clay-line);">
            <button class="w-6 h-6 rounded flex items-center justify-center font-bold text-xs bg-white border hover:bg-stone-100" aria-label="Decrease quantity">−</button>
            <span class="font-bold text-xs px-2">${item.quantity}</span>
            <button class="w-6 h-6 rounded flex items-center justify-center font-bold text-xs bg-white border hover:bg-stone-100" aria-label="Increase quantity">+</button>
          </div>
        `;

        const [minusBtn, plusBtn] = card.querySelectorAll("button");
        minusBtn.onclick = () => { updateCartQuantity(tableNumber, item.menuItemId, item.quantity - 1); render(); };
        plusBtn.onclick = () => { updateCartQuantity(tableNumber, item.menuItemId, item.quantity + 1); render(); };
        container.appendChild(card);
      });

      const totalVal = cartTotal(cart);
      document.getElementById("subtotal-amount").textContent = `₹${totalVal}`;
      document.getElementById("cart-total").textContent = `₹${totalVal}`;
    }

    document.getElementById("place-order-btn").onclick = async () => {
      const cart = getCart(tableNumber);
      if (cart.length === 0) return;

      const btn = document.getElementById("place-order-btn");
      btn.disabled = true;
      btn.textContent = "Placing order…";

      try {
        const { order } = await api.placeOrder(
          tableNumber,
          cart.map((c) => ({ menuItemId: c.menuItemId, quantity: c.quantity }))
        );
        clearCart(tableNumber);
        window.location.href = `order-status.html?table=${tableNumber}&order=${order._id}`;
      } catch (err) {
        alert(err.message || "Couldn't place your order. Please try again.");
        btn.disabled = false;
        btn.textContent = "Send Order to Kitchen 🔥";
      }
    };

    render();
  </script>
</body>
</html>
