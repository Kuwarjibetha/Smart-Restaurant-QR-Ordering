<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Menu · Table</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="../css/style.css" />
</head>
<body>

<!-- Sticky header -->
<header class="sticky top-0 z-30" style="background: var(--cream); border-bottom: 1px solid var(--clay-line);">
  <div class="max-w-2xl mx-auto px-5 py-4 flex items-center justify-between">
    <div>
      <p class="eyebrow" id="table-label">Table —</p>
      <h1 class="display text-2xl">The Menu</h1>
    </div>
    <a href="cart.html" id="cart-link" class="card px-4 py-2 flex items-center gap-2 relative" style="text-decoration:none; color:var(--charcoal);">
      <span>🧺</span>
      <span id="cart-count" class="text-sm font-semibold">0</span>
    </a>
  </div>
</header>

<main class="max-w-2xl mx-auto px-5 pb-32 pt-6">

  <!-- Group ordering -->
  <section id="group-order-banner" class="card p-5 mb-8"></section>

  <!-- AI recommendation -->
  <section class="card p-5 mb-8">
    <p class="eyebrow mb-2">Not sure what to get?</p>
    <p class="text-sm mb-3" style="color: var(--charcoal-soft)">Tell us your mood — spicy, quick, light, under a budget — and we'll point at the menu.</p>
    <div class="flex gap-2">
      <input id="recommend-input" type="text" placeholder="e.g. something spicy and vegetarian, under ₹200"
        class="flex-1 px-3 py-2 rounded-lg text-sm" style="border:1.5px solid var(--clay-line); background:var(--white); outline:none;" />
      <button id="recommend-btn" class="btn-primary px-4 py-2 text-sm">Ask</button>
    </div>
    <div id="recommend-results" class="mt-3 flex flex-wrap"></div>
  </section>

  <!-- Dietary / allergen Q&A -->
  <section class="card p-5 mb-8">
    <p class="eyebrow mb-2">Allergy or dietary question?</p>
    <p class="text-sm mb-3" style="color: var(--charcoal-soft)">Ask about a specific dish — e.g. "does the Butter Chicken have nuts?" or "what's vegan here?"</p>
    <div class="flex gap-2">
      <input id="ask-menu-input" type="text" placeholder="e.g. is the Masala Dosa gluten-free?"
        class="flex-1 px-3 py-2 rounded-lg text-sm" style="border:1.5px solid var(--clay-line); background:var(--white); outline:none;" />
      <button id="ask-menu-btn" class="btn-primary px-4 py-2 text-sm">Ask</button>
    </div>
    <div id="ask-menu-result" class="mt-3"></div>
  </section>

  <div id="menu-container">
    <p style="color: var(--charcoal-soft)">Loading menu…</p>
  </div>
</main>

<script src="../js/api.js"></script>
<script src="../js/cart.js"></script>
<script src="../js/recommend.js"></script>
<script src="../js/askMenu.js"></script>
<script src="../js/socket.io.min.js"></script>
<script src="../js/socketClient.js"></script>
<script src="../js/groupOrder.js"></script>
<script>
  document.getElementById("ask-menu-btn").onclick = () => {
    handleAskMenuSubmit(document.getElementById("ask-menu-input"), document.getElementById("ask-menu-result"));
  };
  document.getElementById("ask-menu-input").addEventListener("keydown", (e) => {
    if (e.key === "Enter") document.getElementById("ask-menu-btn").click();
  });

  const tableNumber = getTableNumberFromUrl() || 1; // fallback for testing without a real QR scan
  document.getElementById("table-label").textContent = `Table ${tableNumber}`;
  document.getElementById("cart-link").href = `cart.html?table=${tableNumber}`;

  function refreshCartBadge() {
    const cart = getCart(tableNumber);
    const count = cart.reduce((n, i) => n + i.quantity, 0);
    document.getElementById("cart-count").textContent = count;
  }

  function categoryIcon(category) {
    const map = { "Starters": "🥟", "Main Course": "🍛", "Desserts": "🍮", "Drinks": "🥤" };
    return map[category] || "🍽️";
  }

  async function loadMenu() {
    const container = document.getElementById("menu-container");
    try {
      const { items } = await api.getMenu();
      const byCategory = {};
      items.forEach((item) => {
        if (!byCategory[item.category]) byCategory[item.category] = [];
        byCategory[item.category].push(item);
      });

      container.innerHTML = "";
      Object.entries(byCategory).forEach(([category, dishes]) => {
        const section = document.createElement("section");
        section.className = "mb-8";
        section.innerHTML = `<h2 class="display text-xl mb-3">${categoryIcon(category)} ${category}</h2>`;

        const list = document.createElement("div");
        list.className = "space-y-3";

        dishes.forEach((item) => {
          const row = document.createElement("div");
          row.className = "card p-4 flex items-center justify-between gap-3";
          row.setAttribute("data-item-id", item._id);
          row.innerHTML = `
            <div class="flex-1">
              <div class="flex items-center gap-2 mb-1">
                <span class="veg-dot ${item.isVeg ? "" : "nonveg-dot"}"></span>
                <span class="font-semibold">${item.name}</span>
              </div>
              <p class="text-sm" style="color: var(--charcoal-soft)">₹${item.price} · ~${item.avgPrepTimeMinutes} min${!item.available ? " · <span style='color:var(--chili)'>Out of stock</span>" : ""}</p>
            </div>
            <button class="btn-primary px-4 py-2 text-sm" ${!item.available ? "disabled" : ""}>Add</button>
          `;
          row.querySelector("button").onclick = async () => {
            const btn = row.querySelector("button");
            const original = btn.textContent;
            try {
              const handledByGroup = await groupOrderAddItem(item);
              if (!handledByGroup) {
                addToCart(tableNumber, item, 1);
                refreshCartBadge();
              }
              btn.textContent = "Added ✓";
              setTimeout(() => (btn.textContent = original), 900);
            } catch (err) {
              alert(err.message);
            }
          };
          list.appendChild(row);
        });

        section.appendChild(list);
        container.appendChild(section);
      });
    } catch (err) {
      container.innerHTML = `<p style="color: var(--chili)">Couldn't load the menu. Check that the backend is running.</p>`;
    }
  }

  document.getElementById("recommend-btn").onclick = () => {
    handleRecommendSubmit(document.getElementById("recommend-input"), document.getElementById("recommend-results"));
  };
  document.getElementById("recommend-input").addEventListener("keydown", (e) => {
    if (e.key === "Enter") document.getElementById("recommend-btn").click();
  });

  refreshCartBadge();
  loadMenu();
  initGroupOrder(tableNumber, document.getElementById("group-order-banner")).then((isGroupMode) => {
    if (isGroupMode) {
      // The shared cart replaces the private one for this session - hide
      // the private cart icon so it's not confusing to have two carts.
      document.getElementById("cart-link").style.display = "none";
    }
  });
</script>
</body>
</html>
